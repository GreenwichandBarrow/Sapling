# Streamlit theme — synced with dashboard/theme.py PALETTE.
# primaryColor controls the active page_link text + dot color, which
# Streamlit's Emotion CSS-in-JS injects directly and our external CSS
# can't override. Setting it here at the theme-provider level wins.

[theme]
base = "dark"
primaryColor = "#4A9EFF"
backgroundColor = "#0B0D12"
secondaryBackgroundColor = "#141821"
textColor = "#E8ECF3"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
