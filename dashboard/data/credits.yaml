# Credits & Subscription Spend — Infrastructure Zone 3
#
# Each tile has:
#   label       — short identifier (uppercase tracked)
#   value       — main number (string for unit flexibility)
#   unit        — one-word unit ("remaining", "/ month", "/ yr")
#   runway_text — runway phrase (e.g. "22 days at current burn (4/day)")
#   runway_color — green | yellow | red | none (colors the runway phrase)
#   trend       — small trend line (e.g. "used 18 this week (+12% vs prior)")
#   trend_arrow — up | down | flat (colors and renders the arrow)
#
# Live billing-API readers wire later — until then operator-maintained.

