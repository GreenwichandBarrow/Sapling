# Tech Stack Inventory — Greenwich & Barrow
#
# Validated by Kay 2026-04-24 against her actual stack.
# Read by dashboard/data_sources.py::load_tech_stack().
# Read by Infrastructure page Zone 5 (full inventory reference list).
#
# Each category is rendered as a row of chips. Order here = display order.
# `note` is optional, shows as small muted text after the service name.
# `health` is optional and reflects current operational state:
#   ok      — green dot
#   warn    — yellow dot (e.g., key expiring, schema drift)
#   alert   — red dot (e.g., expired key, broken auth)
#   retired — grey dot (kept for historical reference)
#
# When health probes go live in Zone 2, those override these static values
# for matching services. This file is the canonical "what we run on" list.

